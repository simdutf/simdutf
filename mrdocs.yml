# $schema: https://mrdocs.com/docs/mrdocs/develop/_attachments/mrdocs.schema.json
#
# Experimental MrDocs configuration (alternative to Doxygen).
# Generate with:  mrdocs mrdocs.yml
# Output lands in doc/mrdocs-html so it does not clobber the Doxygen
# output in doc/api/html.

source-root: .
compilation-database: build_mrdocs/compile_commands.json
output: doc/mrdocs-html

generator: html
multipage: true

# Custom addons: the stock html generator emits unstyled HTML, so we overlay a
# single template (mrdocs-addons/generator/html/layouts/wrapper.html.hbs) to
# inject the header/sidebar/stylesheet. `addons-supplemental` layers our addon
# on top of the bundled defaults (last-wins), so we only ship the one file we
# override -- everything else is inherited. Requires MrDocs >= the develop build
# (the addons-supplemental overlay is not in the 0.8.0 release).
addons-supplemental:
  - mrdocs-addons

# Only document the public API declared under include/.
input:
  - include

# Restrict to the public simdutf namespace; drop internal machinery.
include-symbols:
  - 'simdutf::**'
exclude-symbols:
  - 'simdutf::internal::**'
  - 'simdutf::scalar::**'
  - 'simdutf::detail'
  - 'simdutf::detail::**'
  - 'simdutf::tables'
  - 'simdutf::tables::**'

extract-all: true
warn-if-undocumented: false

# NOTE: the bundled Clang has no default sysroot and may fail to find libc
# headers such as <strings.h>. scripts/build_api_docs.sh handles this:
# `--libc-includes=$(xcrun --show-sdk-path)/usr/include` on macOS, and
# `--use-system-libc` on Linux (needed on distros like Fedora whose include
# layout the bundled Clang does not probe out of the box).
