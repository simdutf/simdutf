name: GitHub Pages site + MrDocs API

on:
  release:
    # Trigger when a release object is created and when it's published.
    # Some GitHub flows create a release object then publish it later; include both.
    types: [created, published]
  # Also trigger on tag creation pushes so releasing via Git tags still runs the workflow
  push:
    tags:
      - "v*"  # common release tag pattern like v1.2.3
    branches:
      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MRDOCS_VERSION: "0.8.0"

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++ python3
      - name: Install MrDocs
        run: |
          curl -fsSL \
            "https://github.com/cppalliance/mrdocs/releases/download/v${MRDOCS_VERSION}/MrDocs-${MRDOCS_VERSION}-Linux.tar.gz" \
            -o mrdocs.tar.gz
          mkdir -p "$HOME/mrdocs"
          tar -xzf mrdocs.tar.gz -C "$HOME/mrdocs" --strip-components=1
          echo "$HOME/mrdocs/bin" >> "$GITHUB_PATH"
      - name: Generate API reference with MrDocs
        run: ./scripts/build_api_docs.sh
      - name: Assemble Pages site
        run: |
          # Static landing page lives at /
          # MrDocs API reference lives at /api/
          mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/api
          cp -r doc/mrdocs-html/. _site/api/
          ls -la _site
          ls -la _site/api | head
      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
